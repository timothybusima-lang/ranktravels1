<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="HTML FORM">
    <meta name="keywords" content="form,textarea,submit">
    <title>REGISTRATION FORM</title> 
    <style>
        fieldset{
            width:400px;
            height:400px;
            margin-left:500px;
        }
        .mydesc{
            display:block;
            margin: bottom 20px;
        }
        form{
            border-radius:10px;
            border-color: white;
            border-width: 3px;
            background-image: url(sun.jpg);
            background-size: cover;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <form method="POST" action="index.html">
        <fieldset>
            <legend style="text-align:center;"><h2>LOGIN</h2></legend>
            <label for="fname">Name</label>
            <input type="text" id="fname" name="name" value="" autofocus required="required" placeholder="Enter Name"><br><br>
            <label for="gd">Gender</label>
            <input type="radio" id="gd" name="gender">MALE<input type="radio" name="gender">FEMALE<br><br>
            <label for="em">Email</label>
            <input type="email" id="em" name="email" value="" required="required"><br><br>
            <label for ="pwd">Password</label>
            <input type="password" id="pwd" name="password" value="" required="required"><br><br>
            <label for="phone">Phone number</label>
            <input type="tel" id="phone" name="phone" value="" required="required"><br><br>
            <input type="submit" name="Login" value="Login">
            </fieldset>
    </form>
    
</body>
